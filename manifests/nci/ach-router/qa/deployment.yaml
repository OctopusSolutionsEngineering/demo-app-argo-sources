apiVersion: apps/v1
kind: Deployment
metadata:
  name: ach-router-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: ach-router-service
  template:
    metadata:
      labels:
        component: ach-router-service
        release: 2.3.10
    spec:
      containers:
        - name: ach-router
          image: index.docker.io/octopussolutionsengineering/ghu-ach-router:26.03.24012006
          ports:
            - name: http-route
              containerPort: 80
          env:
            - name: DATABASE_SERVER
              value: "pt-postgres-server-non-prod"
            - name: DATABASE_NAME
              value: "ach-router-db"
